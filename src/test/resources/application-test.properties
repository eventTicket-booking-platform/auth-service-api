spring.config.import=
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
eureka.client.enabled=false

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.token-uri=http://localhost/realms/test/protocol/openid-connect/token

accessKey=test-access-key
secret=test-secret-key
region=us-east-1
bucketName=test-bucket
public.key.string=test-public-key

keycloak.config.server-url=http://localhost:8080
keycloak.config.realm=test-realm
keycloak.config.client-id=test-client
keycloak.config.grant-type=password
keycloak.config.name=test-user
keycloak.config.password=test-password
keycloak.config.secret=test-client-secret
